<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — GeoTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg: #06080f;
  --surface: #0c1120;
  --card: #111827;
  --border: rgba(99,179,237,0.1);
  --accent: #63b3ed;
  --accent2: #f6ad55;
  --green: #68d391;
  --purple: #a78bfa;
  --red: #fc8181;
  --text: #e2e8f0;
  --muted: #4a5a72;
  --muted2: #6a7f9a;
  --radius: 14px;
  --radius-sm: 9px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}
/* NAV */
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 22px;
  background:rgba(6,8,15,0.97);
  border-bottom:1px solid var(--border);
  z-index:1000; flex-shrink:0; height:52px;
}
.nav-left { display:flex; align-items:center; gap:10px; }
.logo-gem {
  width:28px; height:28px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:0.85rem;
}
.nav-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; letter-spacing:-0.5px; display:flex; align-items:center; gap:8px; }
.nav-title span { color:var(--accent2); }
.nav-admin-badge { font-size:0.62rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted2); background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:5px; padding:2px 7px; }
.nav-right { display:flex; align-items:center; gap:8px; }
.live-badge { display:flex; align-items:center; gap:6px; background:rgba(104,211,145,0.08); border:1px solid rgba(104,211,145,0.2); border-radius:100px; padding:4px 12px; font-size:0.72rem; font-weight:600; color:var(--green); letter-spacing:1px; text-transform:uppercase; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.4s ease-in-out infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.btn-sm { padding:6px 13px; border-radius:var(--radius-sm); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--muted2); transition:all 0.2s; display:flex; align-items:center; gap:5px; }
.btn-sm:hover { background:rgba(99,179,237,0.08); color:var(--accent); border-color:rgba(99,179,237,0.25); }
.btn-danger:hover { background:rgba(252,129,129,0.08); color:var(--red); border-color:rgba(252,129,129,0.25); }
/* STATS */
.stats-bar {
  display:flex; align-items:center; padding:0 22px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0; height:38px; gap:0; overflow-x:auto;
}
.stat-item { display:flex; align-items:center; gap:7px; padding-right:18px; margin-right:18px; border-right:1px solid var(--border); font-size:0.74rem; color:var(--muted2); white-space:nowrap; flex-shrink:0; }
.stat-item:last-child { border-right:none; }
.stat-num { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; color:var(--text); }
.stat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
/* MAIN */
.main { display:flex; flex:1; overflow:hidden; position:relative; }
/* SIDEBAR */
.sidebar { width:300px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.sidebar-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.84rem; display:flex; align-items:center; gap:7px; }
.sidebar-count { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--muted2); background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:6px; padding:2px 8px; }
.filter-tabs { display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.filter-tab { flex:1; padding:5px 6px; border-radius:7px; border:1px solid var(--border); background:transparent; font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500; color:var(--muted2); cursor:pointer; transition:all 0.18s; text-align:center; }
.filter-tab:hover { color:var(--text); }
.tab-active-all,
.tab-active-login { background:rgba(99,179,237,0.1); color:var(--accent); border-color:rgba(99,179,237,0.25); }
.tab-active-msg { background:rgba(104,211,145,0.1); color:var(--green); border-color:rgba(104,211,145,0.25); }
.sidebar-list { overflow-y:auto; flex:1; padding:8px; scrollbar-width:thin; scrollbar-color:rgba(99,179,237,0.15) transparent; }
.sidebar-list::-webkit-scrollbar { width:4px; }
.sidebar-list::-webkit-scrollbar-thumb { background:rgba(99,179,237,0.2); border-radius:2px; }
/* CARDS */
.user-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 12px; margin-bottom:5px; cursor:pointer; transition:all 0.18s; position:relative; }
.user-card:hover { border-color:var(--c-type,var(--accent)); transform:translateX(2px); }
.user-card.active { border-color:var(--c-type,var(--accent)); background:rgba(var(--c-rgb,99,179,237),0.06); }
.card-type-badge { font-size:0.62rem; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--c-type); margin-bottom:5px; }
.user-email { font-size:0.82rem; font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-coords { font-size:0.71rem; color:var(--muted2); font-family:'JetBrains Mono',monospace; margin-bottom:3px; }
.user-time { font-size:0.69rem; color:var(--muted); }
.no-loc-tag { font-size:0.65rem; color:var(--muted); background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:4px; padding:1px 6px; }
/* MAP */
#map { flex:1; z-index:1; }
/* force tile load */
.leaflet-tile-pane { filter: brightness(0.85) saturate(1.1); }
/* INFO PANEL */
.map-info {
  position:absolute; top:14px; right:14px; z-index:800;
  background:rgba(6,8,15,0.9); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; min-width:200px; pointer-events:none; display:none;
}
.map-info.show { display:block; animation:popIn 0.22s ease; }
@keyframes popIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
.info-type { font-size:0.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
.info-email { font-size:0.84rem; font-weight:500; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.info-coord { font-family:'JetBrains Mono',monospace; font-size:0.74rem; color:var(--muted2); margin-bottom:4px; }
.info-time { font-size:0.7rem; color:var(--muted); }
/* LOADING */
.loading-overlay { position:absolute; inset:0; background:rgba(6,8,15,0.92); display:flex; align-items:center; justify-content:center; z-index:900; flex-direction:column; gap:16px; }
.loading-overlay.hide { display:none; }
.spinner-ring { width:40px; height:40px; border:3px solid rgba(99,179,237,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text { font-size:0.82rem; color:var(--muted2); letter-spacing:0.5px; }
/* EMPTY */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:160px; color:var(--muted); font-size:0.82rem; gap:8px; text-align:center; padding:20px; }
.empty-icon { font-size:2.2rem; margin-bottom:4px; }
/* TOAST */
#adminToast { position:fixed; bottom:24px; right:24px; z-index:9999; background:var(--card); border-radius:var(--radius-sm); padding:12px 18px; font-size:0.84rem; box-shadow:0 16px 48px rgba(0,0,0,0.6); transition:all 0.3s cubic-bezier(0.22,1,0.36,1); max-width:300px; border:1px solid var(--border); opacity:0; transform:translateY(20px); pointer-events:none; }
#adminToast.show { opacity:1; transform:translateY(0); pointer-events:auto; }
@media(max-width:700px){
  .main{flex-direction:column;}
  .sidebar{width:100%;height:220px;border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo-gem">💎</div>
    <div class="nav-title">Geo<span>Track</span></div>
    <div class="nav-admin-badge">Admin</div>
  </div>
  <div class="nav-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <button class="btn-sm" onclick="window.doRefresh && window.doRefresh()">↺ Refresh</button>
    <button class="btn-sm btn-danger" onclick="window.hapusSemua && window.hapusSemua()">🗑 Hapus Semua</button>
  </div>
</nav>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-dot" style="background:var(--accent);box-shadow:0 0 5px var(--accent)"></span>Total <span class="stat-num" id="statTotal">—</span></div>
  <div class="stat-item"><span class="stat-dot" style="background:var(--accent)"></span>Login <span class="stat-num" id="statLogin">—</span></div>
  <div class="stat-item"><span class="stat-dot" style="background:var(--green)"></span>Pesan <span class="stat-num" id="statMsg">—</span></div>
  <div class="stat-item"><span class="stat-dot" style="background:var(--purple)"></span>Dengan Lokasi <span class="stat-num" id="statLokasi">—</span></div>
  <div class="stat-item"><span class="stat-dot" style="background:var(--muted)"></span>Tanpa Lokasi <span class="stat-num" id="statTanpa">—</span></div>
</div>

<div class="main">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-ring"></div>
    <div class="loading-text">Memuat data real-time...</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">📋 Data Masuk</div>
      <div class="sidebar-count" id="sidebarCount">0</div>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab tab-active-all" id="tab-all"   onclick="setFilter('all')">Semua</button>
      <button class="filter-tab"                id="tab-login" onclick="setFilter('login')">Login</button>
      <button class="filter-tab"                id="tab-msg"   onclick="setFilter('msg')">Pesan</button>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <div class="empty-state"><div class="empty-icon">📭</div><div>Belum ada data</div></div>
    </div>
  </div>

  <div id="map"></div>

  <div class="map-info" id="mapInfo">
    <div class="info-type"  id="infoType"></div>
    <div class="info-email" id="infoEmail"></div>
    <div class="info-coord" id="infoCoord"></div>
    <div class="info-time"  id="infoTime"></div>
  </div>
</div>

<div id="adminToast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, orderBy, query,
         getDocs, deleteDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:            "AIzaSyB5Bh8q4h_Umav-INVDAIOKdmq125Tcs28",
  authDomain:        "geotrack-app-52d2c.firebaseapp.com",
  projectId:         "geotrack-app-52d2c",
  storageBucket:     "geotrack-app-52d2c.firebasestorage.app",
  messagingSenderId: "404077683049",
  appId:             "1:404077683049:web:5df6ff0caf87735f265df8"
}));

/* ─ Toast ─ */
let _tt;
function toast(msg, ok = true) {
  const el = document.getElementById('adminToast');
  el.textContent = (ok ? '✓ ' : '✕ ') + msg;
  el.style.borderLeft = ok ? '3px solid #68d391' : '3px solid #fc8181';
  el.style.color = ok ? '#68d391' : '#fc8181';
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3500);
}

/* ══════════════════════════════════════
   MAP — pakai OSM standar agar tidak hitam
   ══════════════════════════════════════ */
const map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* Primary: OSM standar (paling reliable) */
const osmLayer = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap contributors', maxZoom: 19 }
);

/* Fallback: jika OSM gagal → pakai tile publik lain */
const fallbackLayer = L.tileLayer(
  'https://tile.openstreetmap.de/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap contributors', maxZoom: 18 }
);

osmLayer.addTo(map);

/* Deteksi tile gagal load → switch fallback */
let failCount = 0;
osmLayer.on('tileerror', () => {
  failCount++;
  if (failCount === 3) {
    map.removeLayer(osmLayer);
    fallbackLayer.addTo(map);
    toast('Tile utama gagal, beralih ke fallback', false);
  }
});

function makeIcon(color) {
  return L.divIcon({
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5),0 0 10px ${color}66;"></div>`,
    className: '', iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

/* ─ State ─ */
let docsLogins    = [];
let docsLocations = [];
let allMarkers    = [];
let activeFilter  = 'all';

/* ─ Filter ─ */
window.setFilter = function (f) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.className = 'filter-tab';
  });
  document.getElementById('tab-all').classList.add(
    f === 'all' ? 'tab-active-all' : f === 'login' ? '' : ''
  );
  const map2cls = { all: 'tab-active-all', login: 'tab-active-login', msg: 'tab-active-msg' };
  document.getElementById('tab-' + f).classList.add(map2cls[f]);
  renderAll();
};

/* ─ Render ─ */
function parseTime(t) {
  if (!t) return 0;
  if (t.seconds) return t.seconds * 1000;
  if (t.toDate) return t.toDate().getTime();
  return 0;
}

function renderAll() {
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];
  document.getElementById('sidebarList').innerHTML = '';

  const logins    = docsLogins.map(d    => ({ ...d, _type: 'login' }));
  const locations = docsLocations.map(d => ({ ...d, _type: 'msg'   }));
  let all = [...logins, ...locations].sort((a, b) => parseTime(b.time) - parseTime(a.time));

  /* stats */
  const withLoc = all.filter(d => d.latitude && d.longitude);
  document.getElementById('statTotal').textContent  = all.length;
  document.getElementById('statLogin').textContent  = logins.length;
  document.getElementById('statMsg').textContent    = locations.length;
  document.getElementById('statLokasi').textContent = withLoc.length;
  document.getElementById('statTanpa').textContent  = all.length - withLoc.length;
  document.getElementById('sidebarCount').textContent = all.length;

  /* filter */
  const filtered = activeFilter === 'all' ? all : all.filter(d => d._type === activeFilter);

  if (filtered.length === 0) {
    document.getElementById('sidebarList').innerHTML =
      `<div class="empty-state"><div class="empty-icon">📭</div><div>Tidak ada data</div></div>`;
    document.getElementById('loadingOverlay').classList.add('hide');
    return;
  }

  const bounds = [];

  filtered.forEach(data => {
    const isLogin = data._type === 'login';
    const color   = isLogin ? '#63b3ed' : '#68d391';
    const rgb     = isLogin ? '99,179,237' : '104,211,145';
    const hasLoc  = !!(data.latitude && data.longitude);

    const ts = parseTime(data.time);
    const timeStr = ts
      ? new Date(ts).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';

    /* card */
    const card = document.createElement('div');
    card.className = 'user-card';
    card.style.setProperty('--c-type', color);
    card.style.setProperty('--c-rgb',  rgb);

    const mainLabel = isLogin ? (data.email || '—') : (data.name || '—');

    card.innerHTML = `
      <div class="card-type-badge">${isLogin ? '🔐 Login' : '📨 Pesan'}</div>
      <div class="user-email" title="${mainLabel}">${mainLabel}</div>
      ${hasLoc
        ? `<div class="user-coords">📍 ${data.latitude.toFixed(5)}, ${data.longitude.toFixed(5)}</div>`
        : `<div class="user-coords"><span class="no-loc-tag">tanpa lokasi</span></div>`}
      <div class="user-time">🕐 ${timeStr}</div>
    `;

    /* marker */
    if (hasLoc) {
      const marker = L.marker([data.latitude, data.longitude], { icon: makeIcon(color) }).addTo(map);
      allMarkers.push(marker);
      bounds.push([data.latitude, data.longitude]);

      marker.on('click', () => {
        showInfo(data, color, isLogin, timeStr);
        highlightCard(card);
      });

      card.addEventListener('click', () => {
        highlightCard(card);
        map.flyTo([data.latitude, data.longitude], 16, { duration: 1.2 });
        showInfo(data, color, isLogin, timeStr);
      });
    } else {
      card.addEventListener('click', () => {
        toast('Data ini tidak memiliki koordinat lokasi.', false);
        highlightCard(card);
      });
    }

    document.getElementById('sidebarList').appendChild(card);
  });

  if (bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds).pad(0.3));
  }

  document.getElementById('loadingOverlay').classList.add('hide');
}

function highlightCard(card) {
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
}

function showInfo(data, color, isLogin, timeStr) {
  document.getElementById('infoType').textContent  = isLogin ? '🔐 Login' : '📨 Pesan';
  document.getElementById('infoType').style.color  = color;
  document.getElementById('infoEmail').textContent = data.email || data.name || '—';
  document.getElementById('infoCoord').textContent = (data.latitude && data.longitude)
    ? `${data.latitude.toFixed(6)}, ${data.longitude.toFixed(6)}` : '—';
  document.getElementById('infoTime').textContent  = timeStr;
  document.getElementById('mapInfo').classList.add('show');
}

/* ─ Realtime ─ */
onSnapshot(
  query(collection(db, 'logins'),    orderBy('time', 'desc')),
  snap => { docsLogins    = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderAll(); },
  e    => toast('Gagal logins: ' + e.message, false)
);

onSnapshot(
  query(collection(db, 'locations'), orderBy('time', 'desc')),
  snap => { docsLocations = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderAll(); },
  e    => toast('Gagal locations: ' + e.message, false)
);

/* ─ Hapus semua ─ */
window.hapusSemua = async function () {
  if (!confirm('Yakin hapus SEMUA data? Tidak bisa dibatalkan!')) return;
  try {
    const [sL, sLoc] = await Promise.all([
      getDocs(collection(db, 'logins')),
      getDocs(collection(db, 'locations'))
    ]);
    await Promise.all([
      ...sL.docs.map  (d => deleteDoc(doc(db, 'logins',    d.id))),
      ...sLoc.docs.map(d => deleteDoc(doc(db, 'locations', d.id)))
    ]);
    toast('Semua data berhasil dihapus!', true);
  } catch (e) {
    toast('Gagal hapus: ' + e.message, false);
  }
};

/* ─ Refresh ─ */
window.doRefresh = function () {
  document.getElementById('loadingOverlay').classList.remove('hide');
  setTimeout(() => document.getElementById('loadingOverlay').classList.add('hide'), 1000);
};

/* ─ Close info panel on map click ─ */
map.on('click', () => document.getElementById('mapInfo').classList.remove('show'));
</script>
</body>
</html>
